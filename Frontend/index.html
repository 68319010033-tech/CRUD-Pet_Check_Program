<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CozyTail - Minimalist Pet Haven Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warmCream: '#FAF7F2',
                        warmSand: '#F3EDE2',
                        sageGreen: '#7F9C86',
                        sageDark: '#5E7463',
                        terracotta: '#D08C60',
                        charcoal: '#2A2A2A',
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts for Minimalist Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', 'Sarabun', sans-serif;
            background-color: #FAF7F2;
        }
        /* Custom scrollbar to keep layout clean */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #FAF7F2;
        }
        ::-webkit-scrollbar-thumb {
            background: #E6DFD3;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #D5CBB9;
        }
    </style>
</head>
<body class="bg-warmCream text-charcoal">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
